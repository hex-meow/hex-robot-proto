syntax = "proto3";
package robot_api;
import "common.proto";
// 控制器级共享资源:IMU / 急停 / 遥控器 / 控制器信息。
// v0.2(2026-07-09,随 09-controller-hal):controller 级硬件 key 统一加 hw/ 前缀 ——
// <vendor>/<controller_id>/hw/{<resource_id>,info};由开源 hex-hw-supervisor 发布(板卡配置
// 为唯一事实源),LAN 侧经 router ACL 只读。<cid>/info(ControllerInfo)仍归 launcher。
// 各资源 typed message + liveliness 表示在不在 —— 因此不再需要旧的通用 SecondaryDevice 封装。
// 夹爪/灵巧手不在此(它是独立机器人 ROBOT_KIND_HAND,走 robot 级)。详见 ../04-...md

message ImuData {
  Header header = 1;
  Vec3 accel = 2;   // m/s^2
  Vec3 gyro  = 3;   // rad/s
  Quat quat  = 4;   // 姿态(可选)
}

message EstopState {
  Header header = 1;
  bool engaged = 2;          // true=已按下/触发
  optional string source = 3;
}

message RemoteState {        // 遥控器/手柄
  Header header = 1;
  bool   active = 2;         // 是否有人在操作(决定是否 overtake API)
  repeated float axes = 3;   // 摇杆轴 [-1,1]
  repeated bool  buttons = 4;
}

message RobotRef {           // 控制器挂载的一个机器人(供发现)
  string    robot_index = 1; // 例: "0" / "r0"
  RobotKind kind = 2;
  string    model = 3;
  string    description_key = 4;  // 去此键 query 取 RobotDescription
}

message VbusState {          // <cid>/hw/<id>(kind="vbus"):总线电压/电流(支持的板才有,三态①)
  Header header = 1;
  float voltage_v = 2;
  optional float current_a = 3;
}

// <cid>/hw/info(queryable,hex-hw-supervisor 发布):本板支持哪些 hw 资源(01 三态①)。
// "在不在"(三态②/③)看各资源 key 的 liveliness,不在这里重复。
message HwResource {
  string id = 1;      // 资源实例名,即 key 尾段:<cid>/hw/<id>。例 "imu0"
  string kind = 2;    // "imu" | "estop" | "remote" | "vbus" | ...(决定消息类型)
  string model = 3;   // 可选,如 "qmi8658" / "mock"
}

message HwInfo {
  string controller_id = 1;
  string sup_version = 2;           // hex-hw-supervisor 版本
  repeated HwResource resources = 3;
}

message ControllerInfo {
  string     controller_id = 1;   // 来自 /etc/machine-id(回退 hostname)
  ApiVersion api_version = 2;
  string     fw_version = 3;
  repeated string   features = 4; // 例: "thermal_limit","gravity_comp","imu","remote"
  repeated RobotRef robots = 5;   // 本控制器上的机器人列表
}

// 危险操作:沿用旧设计的魔数保护。
enum RebootMode {
  REBOOT_MODE_UNSPECIFIED = 0;
  REBOOT_MODE_APP_ONLY = 1;
  REBOOT_MODE_LINUX = 2;
  REBOOT_MODE_APP_WITH_MOTOR_POWER_CUT = 3;
}
message RebootRequest {
  uint64     magic = 1;        // 必须等于约定魔数
  RebootMode mode = 2;
}

// ── 控制器配置 RPC(07 v0.3 简化版,2026-07-09):launcher 为 launch.yaml 提供
// <cid>/config(queryable)与 <cid>/rpc/config/{validate,set}、<cid>/rpc/restart。
// 语义:validate-reject(非法绝不落盘)+ 原子写(tmp+fsync+rename)+ 恢复模式
// (配置空/非法/子进程反复崩溃时 launcher 仍可发现、可写)。无 trial-boot A/B。
// board.yaml(hex-hw-supervisor)另走 <cid>/hw/rpc/config/set:同 validate-reject +
// 原子写 + sync,但【断电重启后生效】(09 §13.1),无热 apply。

message ConfigGet {
  string yaml = 1;
  string sha256 = 2;          // 乐观锁基准
  string path = 3;            // canonicalize 后的实际文件路径
  int64  mtime_unix = 4;
  ApiVersion schema_version = 5;
  bool   recovery_mode = 6;   // true = 当前配置空/非法,launcher 处于恢复模式(零 robot)
}

message CriticalChange {      // 语义红线(mock 翻转/换 CAN/标定 env):GUI 红色 diff + 复述确认
  string robot_id = 1;
  string field = 2;
  string old = 3;
  string new = 4;
}

message ConfigValidateRequest  { string yaml = 1; }
message ConfigValidateResponse {
  bool ok = 1;
  repeated string errors = 2;
  repeated CriticalChange critical_changes = 3;
}

message ConfigSetRequest {
  string yaml = 1;
  string expect_sha256 = 2;   // 与当前文件不符 → 拒绝(防两个 GUI 互踩)
  bool   apply = 3;           // true = 写盘后立即重启子进程生效
  bool   confirm = 4;         // 有 critical_changes 时必须 true(GUI 复述确认后)
  bool   force = 5;           // 越过会话占用检查(危险,文案写明后果)
}
message ConfigSetResponse {
  bool ok = 1;
  repeated string errors = 2;
  repeated CriticalChange critical_changes = 3;
  string sha256 = 4;          // 写入后的新指纹
  bool   applied = 5;
  repeated string robots = 6; // apply 影响的机器人
}

message RestartRequest  { bool confirm = 1; bool force = 2; }
message RestartResponse { bool ok = 1; repeated string robots = 2; }
